{{- if and (eq .Values.kafka.storage.type "persistent-claim") (eq (lower .Values.kafka.storage.cloudProvider) "azure") }}
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: {{ include "nbs-kafka.storageClassName" . }}
provisioner: disk.csi.azure.com # replace with "kubernetes.io/azure-file" if aks version is less than 1.21
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  skuName: Standard_LRS
reclaimPolicy: Retain
{{- end }} 

