# Temporary to get started. Will want reclaim volume, etc to ensure data is not lost
{{- if and (eq .Values.kafka.storage.type "persistent-claim") (eq (lower .Values.kafka.storage.cloudProvider) "aws") }}
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: {{ include "nbs-kafka.storageClassName" . }}
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: gp3
  iops: "3000"       # Baseline performance for Kafka
  throughput: "125"  # Baseline throughput in MiB/s
reclaimPolicy: Retain
{{- end }}