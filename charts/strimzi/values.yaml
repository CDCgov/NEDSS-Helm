# Default values for ..

kafka:
  version: 4.2.0 # version format major.minor.patch
  metadataVersion: 4.2-IV1 # version format for kraft major.minor-IV1   
  replicas: 3 # note reducing or increasing this number requires a matching change in kafka.config section
  storage:
    type: ephemeral # Valid types persistent-claim, ephemeral (default)
    # TODO - fix volume peristence. 
    # cloudProvider: aws # valid type (only if type: persistent-claim) = aws, azure
    # pvc: # only if type: persistent-claim 
    #   esPvClaim:
    #     efsFileSystemId: "" # AWS EFS ID            
    #     storageRequest: 100Gi
    #     storageSize: "100Gi" 
  config: # config changes significantly between kraft and zookeeper mode
    offsets.topic.replication.factor: 3 # TODO: figure out how to define relationship between replicas and replication
    transaction.state.log.replication.factor: 3
    transaction.state.log.min.isr: 2
    default.replication.factor: 3
    min.insync.replicas: 2

# Settings for the Strimzi Operator Dependency
strimziKafkaOperator:
  watchNamespaces: ["default"]
  # Use this if you want the operator to be installed in the same namespace
  # and manage that specific namespace.

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: "test"

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80


resources: {}  
  # limits:
  #   cpu: 100m
