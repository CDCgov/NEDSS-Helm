apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    {{- include "reporting-pipeline-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      # Labels used to match pods created by this Deployment.
      {{- include "reporting-pipeline-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        # Labels applied to the pod template for identification.
        {{- include "reporting-pipeline-service.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      # Service account name for the pod.
      serviceAccountName: {{ .Chart.Name }}
      {{- if .Values.startupDependencies.enabled }}
      initContainers:
        - name: wait-for-reporting-dependencies
          image: "{{ .Values.startupDependencies.image }}"
          imagePullPolicy: "{{ .Values.startupDependencies.imagePullPolicy | default "IfNotPresent" }}"
          command:
            - sh
            - -ec
            - |
              timeout_seconds="{{ .Values.startupDependencies.timeoutSeconds | default 300 }}"
              interval_seconds="{{ .Values.startupDependencies.pollIntervalSeconds | default 5 }}"
              start="$(date +%s)"
              wait_for() {
                name="$1"
                url="$2"
                while true; do
                  if curl -fsS "$url" >/dev/null; then
                    echo "$name is ready"
                    return 0
                  fi
                  now="$(date +%s)"
                  if [ "$((now - start))" -ge "$timeout_seconds" ]; then
                    echo "timed out waiting for $name at $url after ${timeout_seconds}s"
                    exit 1
                  fi
                  echo "waiting for $name at $url..."
                  sleep "$interval_seconds"
                done
              }
              wait_for "debezium" "{{ .Values.startupDependencies.endpoints.debezium }}"
              wait_for "kafka-connect" "{{ .Values.startupDependencies.endpoints.kafkaConnect }}"
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: "{{ .Values.image.pullPolicy | default "IfNotPresent" }}"
          ports:
            - containerPort: {{ .Values.service.port }}

          # i.e. http://<pod-ip>:8095/actuator/health
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path | default "/actuator/health" }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds | default "30" }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds | default "10" }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold | default "5" }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path | default "/actuator/health" }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds | default "60" }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds | default "30" }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold | default "5" }}
          {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # The environment variables for this container are referenced by CDCgov/NEDSS-DataReporting/reporting-pipeline-service/src/main/resources/application.yaml
          env:
            # The following two variables do not appear to be used/needed anywhere:
            - name: ENV
              value: {{ .Values.env | quote }}
            - name: TZ
              value: {{ .Values.timezone | quote }}

            - name: DEBEZIUM_CONNECT_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.connectUrls.debezium.configMapName }}
                  key: {{ .Values.connectUrls.debezium.key }}
            - name: KAFKA_CONNECT_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.connectUrls.kafkaConnect.configMapName }}
                  key: {{ .Values.connectUrls.kafkaConnect.key }}

            - name: KAFKA_BOOTSTRAP_SERVER
              value: {{ .Values.kafka.cluster | quote }}
            - name: DB_CONNECTION_URL
              value: {{ .Values.jdbc.connection_url | quote }}

            - name: DB_USERNAME
              value: {{ .Values.jdbc.username | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.jdbc.password | quote }}

            # Feature flags:
            - name: FF_ES_ENABLE
              value: {{ .Values.featureFlag.elasticSearchEnable | quote }}
            - name: FF_THREAD_POOL_SIZE
              value: {{ .Values.featureFlag.threadPoolSize | quote }}
            - name: FF_POST_PROCESSING_ENABLE
              value: {{ .Values.featureFlag.postProcessingEnable | quote }}
