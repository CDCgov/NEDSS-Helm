{{/*
Traefik IngressRoute - Cached static assets with regex path matching
Uses IngressRoute CRD because regex paths cannot be expressed with standard Ingress pathType.
Only rendered when traefik.enabled is true.
*/}}
{{- if .Values.traefik.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "nbs-ingress.fullname" . }}-cached
  labels:
    {{- include "nbs-ingress.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.appHost }}`) && PathRegexp(`\.(jpg|svg|jpeg|gif|png|ico|css|zip|tgz|gz|rar|bz2|pdf|txt|tar|wav|bmp|rtf|js|flv|swf|ttf|woff|woff2)$`) && !PathPrefix(`/auth`) && !PathPrefix(`/ecr-viewer`) && !PathPrefix(`/orchestration`)
      kind: Rule      
      services:
        - name: {{ .Values.app.gateway.serviceName }}
          port: {{ .Values.app.gateway.port }}
      middlewares:
        - name: nbs-cached-headers
          namespace: {{ .Release.Namespace }}        
  tls:
    secretName: {{ .Values.appHost }}
{{- end }}