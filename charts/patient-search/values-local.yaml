  #   - secretName: ps.localhost
  #     hosts:
  #       - ps.localhost
  hosts:
    - host: patient-search.localdev.me
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: patient-search
            port:
              number: 80

# nbsExternalName: app-classic.dev-cdc-nbs.eqsandbox.com

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

ingressHost: "patient-search.localdev.me"

