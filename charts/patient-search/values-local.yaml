  repository: ""
  pullPolicy: IfNotPresent
  tag: "main-84"

imagePullSecrets: 
  - name: us-east-1-ecr-registry
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  httpsPort: 443

ingress:
  enabled: false
  className: "nginx"  
