apiVersion: v2
name: real-time-reporting
description: Umbrella chart for RTR Debezium, Kafka Connect, and Reporting Pipeline Service
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: debezium-rtr
    version: 0.0.2
    repository: file://charts/debezium-rtr
    condition: debezium-rtr.enabled
  - name: kafka-connect
    version: 0.1.0
    repository: file://charts/kafka-connect
    condition: kafka-connect.enabled
  - name: reporting-pipeline-service
    version: 1.3.1
    repository: file://charts/reporting-pipeline-service
    condition: reporting-pipeline-service.enabled
