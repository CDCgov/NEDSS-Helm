replicaCount: 1

image:
  #repository: "public.ecr.aws/o1z7u2g7/cdc-nbs-modernization/elasticsearch"
  repository: "quay.io/us-cdcgov/cdc-nbs-modernization/elasticsearch"
  pullPolicy: IfNotPresent
  tag: "v1.0.2"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: 
  runAsUser: 1000
  fsGroup: 1000

service:
  type: ClusterIP
  port: 9200
  port2: 9300

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []

resources: 
  limits:
    memory: "6Gi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# "aws" and "azure" are the supported values
cloudProvider: aws

# For Azure:
azure:
  files:
    storageRequest: 100Gi
    # The storage account created by the NEDSS-Infrastructure/terraform/azure/modules/2-nbs7/storage-account module:
    storageAccountName: "EXAMPLE_STORAGE_ACCOUNT_NAME"
    # The resource group where the storage account lives:
    resourceGroupName: "EXAMPLE_RESOURCE_GROUP_NAME"

# AWS PVC Settings:
pvc:
  esPvClaim:
    storageClass: efs-es
    storageRequest: 100Gi

# For AWS:
efsFileSystemId: "EXAMPLE_EFS_ID"
