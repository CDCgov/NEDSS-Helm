replicaCount: 1

image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: "main-3"

imagePullSecrets: 
  - name: us-east-1-ecr-registry

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: 
  runAsUser: 1000
  fsGroup: 1000

service:
  type: ClusterIP
  port: 9200
  port2: 9300

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []

resources: 
  limits:
    memory: "2Gi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 20

nodeSelector: {}

tolerations: []

affinity: {}

pvc:
  esPvClaim:
    enabled: false
    storageClass: elasticsearch-gp-elastic
    storageRequest: 5Gi
