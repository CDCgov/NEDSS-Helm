# This is the Traefik equivalent of the Helm-managed main-ingress-resource-cached.
# Uses IngressRoute CRD because the regex path pattern cannot be expressed
# with standard Kubernetes Ingress pathType (Prefix/Exact).

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-cached-ingress
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`app.EXAMPLE_DOMAIN`) && PathRegexp(`^/(?!auth|ecr-viewer|orchestration).+\\.(jpg|svg|jpeg|gif|png|ico|css|zip|tgz|gz|rar|bz2|pdf|txt|tar|wav|bmp|rtf|js|flv|swf|ttf|woff|woff2)$`)"
      kind: Rule
      services:
        - name: nbs-gateway-svc
          port: 8000
      middlewares:
        - name: nbs-cached-headers
          namespace: default
  tls:
    secretName: app.EXAMPLE_DOMAIN